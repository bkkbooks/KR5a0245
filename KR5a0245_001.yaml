front:
  text: 大丹直指卷上并序稱六
  hash: sha256:5d3aae04634b9e35b515ea9e7131dfddbc1123728aee32faee27e6ace21aae9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0245_HFL_001-001a, image: hfl/0115/0115-004.png}
body:
  text: 長春演道主教真人丘處機述仙經曰觀天之道執天之行盡矣體天法象則而行之可也天地本太空一氣靜極則動變而為二輕清向上為陽為天重濁向下為陰為地既分而為二亦不能靜因天氣先動降下以合地氣至極復升地氣本不升因天氣混合引帶而上至極復降上下相須不已化生萬物天化日月星辰地化河海山嶽次第而萬物生蓋萬物得陰陽升降之氣方生得日月精華鍊煮方實日月運行周回自有徑路不得中氣斡旋不轉蓋中氣屬北斗所居斗柄破軍即中天大聖非北方也對指天罡逐時轉移日月星辰隨指自運斗經云天罡所指晝夜常輪是也天地升降日月運行不失其時萬物化生無有窮已蓋人與天地稟受一同始因父母二氣交感混合成珠內藏一點元陽真氣外包精血與母命蒂相連母受胎之後自覺有物一呼一吸皆到彼處與所受胎元之氣相通先生兩腎其餘臟腑次第相生至十月胎圓氣足未生之前在母腹中雙手掩其面九竅未通受母氣滋養混混沌沌純一不雜是為先天之氣才至氣滿神具精足臍內不納母之氣血與母命蒂相離神氣向上頭轉向下降生一出母腹雙手自開其氣散於九竅呼吸從口鼻出入是為後天也臍內一寸三分所存元陽真氣更不曾相親迷忘本來面目逐時耗散以致病夭憂愁思慮喜怒哀樂但臍在人身之中名曰中宫命府混沌神室黃庭丹田神氣穴歸根竅復命關鴻濛竅百會穴生門太乙神爐本來面目異名甚多此處包藏精髓貫通百脈滋養一身淨裸裸赤灑灑無可把蓋常人不能親者被七情六欲所牽迷忘本來去處呼吸之氣止到氣海往來氣海在上膈肺府也既不曾得到中宫命府與元氣真氣相接金木相間隔如何得龍虎交媾化生純粹又不知運動之機陰符云天發殺機是也如何是氣液流轉以鍊神形蓋心屬火中藏正陽之精名曰汞木龍腎屬水中藏元陽真氣名曰鉛金虎先使水火二氣上下相交升降相接用意勾引脫出真精真氣混合於中宫用神火烹鍊使氣周流於一身氣滿神壯結成大丹非特長生益壽若功行兼修可躋聖位謹謹詳述于後人人具足箇箇圓成五行顚倒周天火候圖天地升降日月往來一闔一闢進退存亡易曰知進退存亡其惟聖人乎三田返復稪肘後飛金精圖恍恍惚惚其中有物窅窅冥冥其中有精清者濁之源漸入真道三田返復金液還丹圖丹就五氣自朝元鍊形换骨內觀起火鍊神合道圖乃為火焰五行顛倒龍虎交媾訣并圖訣曰龍是心液上正陽之氣制之不上出若見腎氣自然相合虎是腎氣中真一之水制之不下走若見心液自然相交龍虎交媾得一粒如黍米形此一法號曰龍虎交媾只此便見藥物也採藥之法人多以子時腎氣發生午時心液降下之際行功若無事牽制則可若有事又是銼過殊不知法乾坤之妙舉腎氣則是子降心液則是午不以時刻皆可但初行之法閉目內視中宫絶慮忘思冥心滿口含津勿吐勿咽到此便飲刀圭之事别有口訣不敢開寫微微斂身並不升舉盤膝升身正坐跏跌不得只如常坐左手兜起外腎右手掩生門臍也塞兊户口也開天門鼻也是為玄牝之門須要一刀割斷然後鼻中入氣入者為吸為息為陰為水只要柔軟入息使鼻內無聞其聲以意輕輕送入中宫至尾閭所謂充開混沌池擘裂鴻濛竅氣極乃從夾脊三關至鼻中輕輕放出出者為呼為消為陽為火輕輕放出使耳內無聞其聲聽氣自出意且不可離中宫意者性也神也真土也黃婆也但所入氣息入中宫與元陽真氣相接相合經云接天地無涯之氣續父母有限之身即天地合其德也哉使水火二氣上下往來相須天地升降一同也勾引腎中真氣鉛也虎也心中木液汞也龍也交媾混合於中宫謂之五行俱全和會一家自然暘美經云氣入臍為息神入氣為胎胎息相合名曰大乙含真此謂龍虎交媾便是藥物一才有藥如母有胎便覺中宫有物所謂圓陀陀活潑潑當用火符鍊煮方得藥物不散右件用法始覺咽乾以覺心沖次覺無味如啞子喫餳其味難説是氣交合而曰交媾每一日行一交得一物狀如黍米還於黃庭之中自可益壽延年若用火候鍊之三百日數足自然凝結形若彈丸色同朱橘號曰內丹如龍有珠龍之有珠可以升舉人有內丹自然長生不死矣口訣云陰有陽兮陽有陰陰陽裏面更重尋學人不達玄微理虛度光陰謾用心五行顚倒龍虎交媾火候訣義華陽施真人曰腎水也水中生氣號曰真火火中暗藏真一之水而曰陰虎心火也火中生液號曰真水水上暗附正陽之氣而曰陽龍故龍虎非是肝肺之像乃心腎之真陰陽也二物混合為一當用意便為子時也自然凝結須知冬至不在子時形如黍米之大每日得一粒僧人名為舍利道士號曰玄珠每日增真氣一丈延壽不可計數三百日氣結丹凝狀如彈丸色同朱橘自可長生不死訣曰五行顚倒術龍從火裏出五行不順行虎向水中生陽龍元向離宫出陰虎還從坎位生二物會時為道本五方行盡得丹名火候圖心氣運行方為真火運火行候火者心也神也性也離也日也意也前探藥二氣升降之際不以意守中宫藥物如何得住如何得運轉聖人藏隱以日太陽火也歸寸土中宫戌時子時者即是意也神性所謂出入無時莫知其向是也一才二氣升降採藥便加時在中宫行火矣火候圖云從外簇年簇月簇日簇時居中經云斗柄運周天在人會攢簇又曰火功若用三千日妙用無方一箇時便是也中宫即對子宫意一指一陽自生經云月之圓存乎口訣時之子妙在心傳二氣如月之二弦兩箇半月相合則圓意到中宫便是子時也復卦起行至三陽水金兩停膀胱至臍和暖應地天泰卦到此只要把捉一塵不著無思念也方得龍虎交媾漸而陽氣向上以至滿身遍體和暖應乾卦藥物透頂亦如風雨潮浪沸滚藥熟化金液如冷泉自降是應姤卦漸涼至濟應否卦丹田火氣漸微應剝卦是一周天此一法號曰周天火候用時行之微微斂身輕輕脅腹凝息數定銖兩默運心氣下至丹田鼻息綿綿若存用之不勤但以意常在中宫意是神子神是氣母神馭氣其氣自然從尾閭穴入夾脊三關直上轆轤穴天關在腦後入崑崙復下丹田周流運轉不絶北方正氣腎氣也為河車所謂河車不敢暫留停運入崑崙峯頂中宫是機意也觸機天關即應所謂神機密運是也訣曰神入氣為胎氣入臍為息右件依時用法臍腹氣聚自熱若用補虛益氣春三月下火四兩夏三月下火六兩秋三月下火八兩冬三月下火二兩若用鍊龍虎交媾第一百日下火五兩自酉至亥第二百日下火十兩自申至亥第三百日下火十五兩自午至亥三百日火足丹凝純陽氣生凝息數念珠一百箇是為一銖二十四銖為一兩計數珠加減隨時口訣脅腹運心方是火含津引息始成丹學人不達玄微理虛度時光過百年初時不數火交關節過可半年正月一日下火方數火五行顚倒周天火候訣義華陽施真人曰心為五陽之主腎為五陰之主五陰升而為水五陽降而為火當用乾之時以心氣下入丹田號曰進火若用補虛益氣當常行用之數一周年奪十年氣補十年虛若行地户之時龍虎交媾法心腎之真陰真陽凝結成黍米大下還黃庭計定數而進火候三百日足曰陰內鍊陽火自合周天右件不以龍虎交媾上下火候是為安樂常行之法若用龍虎交媾相兼而行是為鍊丹抽添之火五兩鍊精成汞十兩鍊汞成砂十五兩鍊砂成丹三百日火候不差自然丹就純陽氣生內鍊五藏號曰鍊氣成神外鍊四肢號曰鍊形服氣若不鍊五藏不鍊四肢止是丹成自可長生若用鍊形而曰地仙形神俱妙若用鍊氣而曰神仙棄殼超凡真人曰鍊質不交陰鬼壯燒丹毋使火龍飛佳人才子正當年花落黃昏聚會難不避主人腸欲斷時來須索閉陽關如不行火候不內鍊係小成法安樂延年背後三關通曰三田返復中宫五行運用曰五行顚倒漸入中成長生不死之道乃曰陸地神仙如傳非人罪及九祖慎之慎之此一法號曰肘後飛金精本法用子時後午時前是氣生時披衣正坐握固存神先存後升先升後偃凸胸偃脊是開中關平坐昂頭是開上關先升後存下腰自腹漸漸舉腰升身而凸胸偃脊是開下關已後氣熱盛上關之下方可舉腰升身正坐一撞三關都過補腦髓自然面紅骨健肌白身輕是名返老還童而長生不死之法也年少行之不老老者行之還童口訣肘後金精節次般存身偃仰過三關學人能悟玄微理返老還童自不難三田返復肘後飛金精訣義華陽施真人曰子時以肺之精華之氣併在腎中號曰金精金精者金水未分肺腎之氣合而為一當時用法自尾閭穴下關般至夾脊中關自中關般至玉京上關節次開關已後一撞三關直入泥丸不止補腦之虛延年益壽返老還童而又抽腎之氣不犯黃庭但得下火鍊方純陽氣生是也老人衰老若曾前法內下功兼修不可單行此法可以返老還童不百曰面紅骨健氣壯身輕若似龍虎交媾周天火候三件相兼而行是為抽添鉛汞漸而延年益壽抽添之法如採藥行火之候陰魔所撓緣入邪念恐把捉不得腎氣順行向下走泄謂之危險即當抽添出氣為鉛腎中氣也添汞入氣為汞心中氣也如入氣至中宫留住其出氣以意引過尾閭穴升身偃脊抽提外腎使氣從尾閭入夾脊雙關直上天關入崑崙使龍不上奔虎不下走邪念即止如氣未覺過再偃再抽直使氣過謂之肘後飛金精畢矣初行費力久則甚易真人曰頂戴蟾宫一朵花朝遊蓬島暮還家能乘乾馬奔龍騎解使坤牛駕虎車又玉京山下羊兒鬥金水河邊石虎眠金針挑出雙蝴蝶盤旋飛到楚王宫大抵高以下為基深以淺為始若人單行龍虎交媾止是補虛益氣活血注顔若人單行火候止可悅其肌膚壯其筋骨若行飛金精法止可返老還童健骨輕身若能通行此三訣甚為有益蓋龍虎相交一物如黍米還黃庭中若不用火候不能鍊之凝結其周天火候止是虛氣聚在丹田不得龍虎交媾玄珠不能留之安住二法已是相須二用肘後抽腎氣入腦不全陰中之陽前犯純陽之丹玄中玄妙中妙矣一百日口內生甘津身有神光骨健顔紅肌白腹暖二百日漸厭葷腥常聞異香行步如飛睡夢自然減少三百日飲食自絶寒暑自耐涎汗涕淚自無病病災難自除靜中時聞遠樂之聲默室漸見紅光之色若見此景勿疑是為小驗至誠行之神異不可備載三田返復金液還丹訣圖肺為華蓋咽喉為重樓口為玉池兊户鼻為天門天柱眉間為玉堂額為天庭頂為天宫耳為雙巿門腎氣傳肝氣肝氣傳脾氣脾氣傳肺氣肺氣傳心氣心氣傳脾氣脾氣傳腎氣是為五行循環而曰小還丹也上田入中田中田入下田三田返復而曰大還丹也此法金液還丹須要升腰舉身正坐雙閉兩耳勿令透出舌拄上腭有清涼香美津液不潄而咽矣右件肘後飛金精節次開關已至一撞三關金精入腦補髓益氣既而面紅骨健顔嫩身輕當依時刻惟要升腰平坐不昂不偃自覺真氣入腦急用二掌緊閉兩耳自然腎氣入腦造化金液下降如淋灰相似每日下火一兩誠恐火多火少火氣多則頭痛火少則金精不飛須行加滅如行火大猛遍身壯熱不可再進火恐火炎熏燒頭目太陽作痛口舌燒破必傷藥物當減息意離中宫聽火自然無不相傷却不要外思邪想須用沐浴如行火至金木兩停欲飛不飛之時欲濟不濟之際最要正意守持一念不生若思念才生即是塵垢塵者陰也陰者魔也被魔所障三關即閉不通也須要斬除其意一正二氣自合以結大丹師云洗滌塵垢道云沐浴金丹悟真篇云刑德臨門藥相之到此金丹宜沐浴二月三陰三陽和暖花木正開忽被陰寒風雨所摧不能結子謂之德中有刑如行功陰魔作障也八月三陰三陽溫涼萬物漸肅殺之時得天氣和暖花木回芽再開謂之刑中有德謂守正止念却得陽和也所謂沐浴防危險妙用在抽添口訣河車般運入崑崙須是牢關雙巿門擊動震雷霹靂鼓急收甘雨灑乾坤三田返復金液還丹訣義華陽子曰前件龍虎交媾周天火候肘後飛金精單行是安樂延年三二百歲盡不出五行顚倒循環生成傳送之功用功不差收鍊一氣而已此金液還丹不止補腦益髓而抽鉛添汞漸有還童之功腦實髓滿用法制之神水自上腭而下清涼甘美復自肺間下入黃庭號曰金液還丹一如壓丹之虛陽二氣以變丹砂為金而曰金丹金丹一粒自可長生與天地齊久故曰中成人不下前功直要金液還丹不用法取之神水不降縱或致功強令頂水下降並無甘美之味令人腦虛疾多與人無益行功應驗初時漸覺丹田黃庭有物和暖真氣上行耳聞風雨之聲漸漸頂內有筝筝金玉之音腮門內謂之天池有金液沸滚如涼泉降下或流面上或流上腦或如珠露之狀或從上愕入口其味甘美久則頂內如笙簧琴瑟絲竹之音又如鶴唳猿啼蟬磬之聲諸般自然之韻無所比擬但初行時夢中聞霹靂之聲是真氣衝開頂陽骨以通九宫神初入室中宫乍超向上須自驚恐閉目自坐之際或時一大物驚跳起開目却無是陽神未壯切勿驚懼著念久而神壯自無隱顯莫測變化無窮將來自知凡見聞皆不著相但聽其自然若著相即是幻也真人曰瓊漿醖就從天降靈藥生成任海枯飲酒須教一百杯東遊西泛自梯媒從來神水出高源奔出黃庭頃刻間五氣朝元太陽鍊形訣圖係中成法長生不死此法至親父子不傳如輕泄及與契義觀者定主災橫及重厄戒慎之此一法號曰太陽鍊形本法用冬至陽生四時皆可行升腰正坐不動閉目忘思默運心火母氣自然隨氣滿四肢不覺己身鼻息綿綿若存用之不勤右四時有暇便行升腰不動丹中五氣紛紜內起正坐不偏丹中五氣紛紜四出腎之真氣鍊骨身輕如毛可以乘風御霧肝之真氣鍊筋實如玉可以走趁奔馬心之真氣鍊血白如膏可以永耐寒暑肺之真氣鍊肌膚瑩如雪可以换骨易形脾之真氣鍊肉硬如石可以化氣如金始自丹成五氣朝真氣聚而不散次用前法而般運內傳五藏外遍四肢五氣鍊形凝而不衰號曰形神俱妙與天齊年口訣丹就自然朝五氣氣真方可現元神鍊形换骨非凡客自是長生物外人五氣朝元太陽鍊形訣義真人曰金液還丹變為金其中純陽氣生是為氣中有氣已是陸地神仙可與天地同其壽算古今上真再舉丹中純陽之氣升入四肢號曰太陽鍊形化氣自然形神俱妙隨五氣而换骨易容自耐寒暑昔日衰朽之姿鍊之端正昔日枯稿之形鍊之紅潤何止返老還童而又身輕骨健乘風而舉跨霧而行號曰南宫飛仙塵中羽客雖未棄殼升仙而已升騰自在當為地仙之上品神仙之下流皆因丹田五氣鍊形外遍四肢是也鍊形之功不為小矣真人曰五馬不調金水伏一龍常駕火雲飛天下都遊半日功不消跨鳳與騎龍五氣不調丹已就一陽外遍火輕飛神氣交合三田既濟圖并訣係中成法長生不死頂中神水下降丹田真氣上升號曰既濟一撞三關入腦曰肘後飛金精此法號曰水火既濟本法用陽時中刻平坐伸腰一撞三關閉耳神水下降伸腰舉腹鼻引長息默運心火上升右件震艮之時一撞三關金精入腦補之數足面紅肌白如膏後身輕方可一撞三關金精入頂緊閉兩耳使腎氣不出併入天宫造化金精下降如淋灰相似自上腭間清涼美味神水滿口若咽之歸黃庭號曰金液還丹當此上腭有甘美水降下咽便以伸腰舉腹默運心火暗引丹田真氣上升而又鼻中出息同舉真氣遍滿四肢上水下火相見於重樓之下號曰既濟口訣頂中神水入中源丹裏真陽返上田水火合來為既濟庭中升入大羅天神氣交合三田既濟訣義真人曰土之既濟為瓦瓦可得千年木之既濟為炭炭可得百載人欲長生無出於既濟之法是還丹鍊形同用其功也金液還丹化丹成金太陽鍊形形之如玉還丹未還之際形鍊欲起之時水上火下相見於重樓之下而曰既濟之時當用地天泰卦子後是也每次一粒如金粟形狀顆顆還於黃庭每顆生金光一道般運出放皮毛之際金光滿室何止長生不死是欲棄殼升仙之時也真人曰兩曜鑄成七寶殿一渠流轉入瓊漿水火都來相並間卦後變成地天泰陰陽升降兩相兼水火交加入下田既濟無差真氣足金丹一粒萬千年右件金液還丹太陽鍊形三田既濟是為長生不死之法故曰中成之法須是小成法見效相續而行之行之不差見驗自速若人不行小成法直要中成而求長生不死不止見效自遲而又徒勞心力虛度時光還丹而神水不下鍊形而丹火不升既濟而水火不交反謗神仙虛語不死為妄言殊不知行持過越是也若人龍虎交而為精火候足而為丹用金精補其腦虛使其還丹變成金丹用丹火鍊其真身又使既濟之法相兼而行善不可加矣若不兼行六法速要燒丹純陽之氣鍊氣成神速要鍊氣之真靈鍊神合道此是金液還丹太陽鍊形三田既濟不須行矣此三訣古今上真往往萬劫祕傳中成之法以還丹鍊形既濟者蓋以留形住世非金丹不可延年非鍊形不可换骨非既濟不可不死又以無醜陋真人少衰弱神仙又易形而留俗狀不既濟而留凡骨將來棄殼自離超神亦遲矣若還丹鍊形既濟之後一百日靜中四象周匝內觀五氣紛紜二百日目見金花體有圓光青氣出頂紫霧盈室三百日神靈知前後事真氣可乾外汞體輕可履風湮骨堅可齊天地若見此境勿疑是為小驗志誠行之神異不可具載矣大丹直指卷上
