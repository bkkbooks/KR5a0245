front:
  text: 大丹直指卷下稱七
  hash: sha256:ac372dd1d5c5b0fabc71ac92bfd29a198439bfb46eb356326ab1208aa4406762
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0245_HFL_002-001a, image: hfl/0115/0115-050.png}
body:
  text: 長春演道主教真人丘處機述五氣朝元鍊神入頂圖大成法棄殼升仙如與小人説者定有橫災宜自謹言此法曰鍊氣成神本法用子午卯酉時甲乙日鍊肝丙丁日鍊心庚辛日鍊肺壬癸日鍊腎脾不受鍊氣寄四臟戊己日不下功此為鍊五臟日也甲乙日卯時下功丙丁日午時下功庚辛日酉時下功壬癸日子時下功此為鍊五臟時也右件依前時用法幽室靜坐上香一炷叩齒二十四通升身平坐內觀所鍊之藏鼻息綿綿若存靜極氣生氣極神現如夢非夢暗中神氣上升前件日辰不可有差蓋以神隨日當真氣隨時運轉當審日察時鍊之百日氣足神現將欲升仙非止長生不死口訣應日隨時自不差五神會處起河車靜中真象朝元後猶恐陰魔作外邪五氣朝元鍊神入頂訣義華陽真人曰以丹中純陽之氣隨日定時鍊肝二十四日青氣現二十日陽神自出氣為神體神為氣主是也鍊心腎肝肺皆如之其脾神脾氣隨四時正氣亦以共升靜中內觀壺中别有山川物象成形兩昧分胎防其陰鬼外魔七魄三尸相隨雜天真以亂陽神不能得上入天宫自有內觀起火之法推以鍊氣氣聚為神不可差其時也自然氣現神出五方真氣合出本色五氣陽神名出真形升而上入天宫內院是為合神入道之時也若人三百日行火候足不鍊還丹不鍊形不既濟直行此法以丹中純陽之氣隨日應元氣所傳而鍊五臟亦是捷徑號曰奪功併法若人欲住世間而願為長生不死當用金液還丹太陽錬形三田既濟真人曰三島紫煙籠鳯彩九天紅日錬龍精中黃經曰肝生東方其色青錬之青氣出身騰腎水北方其色黑錬之應時黑氣出身立純陽氣滿五臟中神升本色入天宫內觀起火錬神合道圖係大成法超凡入聖丹中純陽氣舉之入四肢號曰焚身入五臟號曰錬神出身號曰降魔入頂號曰素殼七魄忘形外魔遠走九蟲下出隂鬼速亡三尸絶迹此訣號曰內觀起火本無時候每日有睱舉起為念略有行持終日靜坐神識內守一意不散常常升身正坐默觀五臟惟要分別真假勿令陰魔亂真矣右件內觀之法止是靜坐升身舉起丹中純陽之氣內鍊五臟氣附神像上入頂中外鍊四肢氣迸金光外出神體非久神合為道棄殼升仙防其陰鬼外魔三尸七魄假托形像以亂天真混雜陽神不能合道所以不計晝夜常隨氣轉卯時觀肝肝氣現青午時觀心心氣現紅酉時觀肺肺氣現白子時觀腎腎氣現黑五色氣出壺中真境不同塵世車馬威儀勝及王者不厭升身起火真假自然兩向也口訣旌旆威儀處處同內觀形像滿壺中再三熒起焚身火嘹喨笙簧入上宫內觀起火鍊神合道訣義真人曰鍊氣自易起火亦難默運丹中純陽之氣隨日隨時以鍊五臟氣真自現神真自出相照上升併入天宫防其陰鬼外魔以假亂真當此之時氣隨神升神附氣起以中田入上田陰鬼願人速老外魔不喜人安虛生隊伍妄起浮華亦傲陽神相雜而升誰為真像誰為假形混雜難别笙簧四圍車馬並起欲要辨别莫若頻起丹中真火一曰焚身二曰降魔三曰去三尸四曰逐七魄五曰集陽神靜中內觀自然明朗惟見炎炎火中人物交雜少間歌樂上起者自己陽神哭泣去者身中陰鬼須臾火息壺中清淨功不可再切防十魔續來蓋以陰鬼外魔多生巧作緣業來亂真神內觀當可分别十魔君或而滿耳笙簧觸目花芳舌有甘味鼻聞異香情思舒暢意氣洋洋如見不得認是六欲魔一也或而和風蕩漾暖日舒長迅雷大雨霹靂電光笙歌嘹喨哭泣悲傷如見不得認是七情魔二也或而瓊樓玉閣蕙悵蘭房珠簾翠幕峻宇雕墻珠珍遍地金玉滿堂如見不得認是為富魔三也或而出將入相威震八方車服顯赫使節旌幢滿門青紫靴笏盈床如見不得認是為貴魔四也或而兒女疾病父母喪亡兄弟離散妻豫分張骨肉患難著族災殃如見不得認是恩愛魔五也或而失身火鑊墮落高嶺臨刑命喪遇毒身亡凶惡難避猛獸逼傷如見不得認是災難魔六也或而雲屯士馬兵刃如霜戈矛間舉弓弩齊張爭來殘害驍捷難當如見不得認是刀兵魔七也或而三清玉皇十地當陽四聖九曜五帝三官威儀隊仗往復翱翔如見不得認是聖賢魔八也或而仙娥玉女羅列成行笙歌鼎沸對舞霓裳雙雙紅袖爭獻金觴如見不得認是妓樂魔九也或而幾多殊麗艷質濃粧蘭臺夜飲玉體輕裳偎人嬌顫爭要成雙如見不得認是女色魔十也大抵清虛之士久樂寂淡乍見繁華往往認為真境因循不出凡軀是為困在昏衢止為陸地神仙不能超凡入聖者舉人目前見在不認外境可以進道漸得成功學人內觀不以丹中純陽氣鍊五臟五氣真神現五色十中笙簧並奏隊仗齊升當時陰鬼外魔假心形像相雜而入天宫速速升身起火火中二軍自散哭聲四向而去歌樂轉盛幽幽高山須臾火過清涼靜中山川秀麗內觀天地有朗是為壺中真境不可便認無事少間十魔續來當此之時如夢非夢似醉非醉五神真靈已入天宫中區四大主心平正恍惚之中不可認賊為子以邪為正不止因而不出凡軀又而流入邪中或而風魔或而狂邪及成神氣虛神慧之不足鳴呼可悲故魔境詳言於此升身起火不厭數多常常內觀不拘晝夜以至火起天地之間並無一物上觀惟天下觀惟地四觀都無靜中時聞樂聲忽有異香當時有驗不比已前肢體常似升龍是神仙棄殼之時也圍坐前有紅光狀同蓮花遍身有真氣色若金光五行真氣合而為精氣神二才異寶合而為自然道也收神再入黃庭水却長生不死所到處陰神來現乘風履雲往復塵中更無飢渴寒暑若以升神復入天宫調神出殼是曰真人棄殼山中百日山中生玉棄殼水中百日水中生玉棄殼了當真身出外是曰神仙當返三島不在風塵之內所謂棄殼升仙而有五訣在左棄殼升仙超凡入聖訣圖識無此是無為妙道空法此一法號曰鍊形合道棄殼升仙本法無時明有五法海蟾子以鶴沖天門靜中以真性如鶴沖天門出外自然身外有身西山十二真人玉祖師曰以花樹出靜中以花樹回望不失本性既出自然身外分形黃帝以火龍出靜中化火龍上踴自然身外有身號曰清淨法身鍾吕二真人皆用紅樓出靜中以上三級紅樓層層上畢便跳自然棄殼右件鍊神合道棄殼升仙功到自然此僧人入定以來坐化道士入靜以出陰神皆為清虛之鬼非為純陽之仙窅窅無像終無所歸學人何其誤耶殊不知鍊精為丹而後純陽氣生鍊氣成神而後真靈神仙超凡入聖棄殼升仙而曰超脫萬萬世神仙不易之法也口訣功成須是出神京內院繁華勿纍身會取五仙超脫訣鍊成仙格出埃塵棄殼升仙超凡入聖訣義真人曰修真之士功到鍊氣成形皆不願長生住世速要內觀而鍊神合道也降魔魔散鍊神神聚急忍無斷因循不棄凡殼是為困在昏衢止為陸地神仙大抵有身有患無家無纍古今共言辛勤功到無為爭忍戀軀不出故棄殼升仙出頂鍊神超凡為仙世人不善修煉直要棄殼便成仙道何其誤形幽室靜坐絶慮忘思外境不入內境不出矣如稿木心若死灰神識內守一意不散定中以出陰靈之神冥冥無像非為純陽之仙縱得出殼何其艱難古今上真皆傳棄殼之法誠非難矣功到自然內丹成就純陽氣生而本靈神現內觀識認棄殼超脫次第相須自然化火龍而出頂中身外有身並無異相始乎一步兩步次以三里五里出入不差往來無懼然後寄殼於山川之中永作蓬萊之侣此是棄殼全在前功證驗節序不差自然神仙升神出頂然而上真留此數法調出入者蓋以學人久受驅馳晝夜用功不已內觀神聚恐認魔境流入邪道徒勞心力廢墮前功故魔不厭詳言又慮學人功到內觀魔散神集併入天宫繁華萬倍猶恐認為仙境不免再陳棄殼之訣棄殼不難功成方合自然所以訣中有花樹皂蓋以記本體招神入殼有鶴沖龍躍以升陽神令神出身棄殼升仙古今上真有輕傳而不祕者九祖水受地獄以修真之士功到自升不可不行古令學人宜戒慎之金丹之祕在於一性一命而已性者天也常潛於頂命者地也常潛於臍頂者性根也臍者命蒂也一根一蒂天地之元也祖也臍下黃庭也庭常守乎頂及臍是謂三疊黃庭曰琴心三疊舞胎仙是也琴取其和旦人之生其胞胎結於我之臍綴接在母之心宫自臍剪落所謂之蒂也蒂者命蒂也根者性根也但恐泄漏是所千千名萬萬狀多方此論頂中之性者鉛也虎也水也金也日也意也坎也坤也戊也姹女也玉關也臍中之命者汞也龍也火也根也月也魄也離也乾也己也嬰兒也金臺也頂為戊土臍為己土二土為圭字所以吕仙翁號刀圭也只是性命二物千經萬論只此是也用法但每日天明至黃昏為晝時自昏至五更煞點時為夜時不拘行住坐卧但晝時則行命蒂臍中之道夜則行性根頂門之道無早無晚不飢不飽之時常行之一百日丹結三百日丹藥成三年胎仙就自然陽神從頂門出入去來無礙此謂真丹之妙也行持日行命蒂者只用兩手相摩令熱捧定臍輪以意專之只守在臍輪無思無想只靜定之自覺神水下臍真火奮發從臍下丹田跳躍直湊乎頂門任其自然亦無遍數只一意守於臍輪若欲休歇行住就便不拘久而丹田如火精神暢美神妙難述夜行性根者只以舌拄上腭漸塞定喉嚨二竅以意專之只守在頂門無思無想只靜定自覺真火從下衮上踴躍直至頂門欲休歇行住任便不拘久而頂中漸如遠聞仙樂之音真香發于鼻之中神妙難述金丹祕訣盡於此矣坐功訣一吸元精便上來兩呼玄化頂門開時人不識真龍虎却向丹田裏面猜奧旨年中取月月中取日日中取時隄防危宿為晦起火斗宿為朔進火元氣氣中神積精精中氣一陽初動乃子時是也此時斗柄才轉真子時又一法九月從子時上起例數過豫者九月做子時乃正子時此時鼻竅雙孔皆有氣金公姹女者乃坎離匡廓即九月中霜降為十一月冬至也妙旨月月常加戌時時見破軍天罡加一位活曜不傳人得中氣節過太陽月將是氣不出喉玄關乃在臍裏一寸三分父母元氣名為鼎器二腎為鼎足火候舉動心做事業便是起火虎龍交姤藥物乃是刀圭巽風橐籥鼓動華房此是進火抽添防危慮險卯時酉時先天乃丑時後天乃本生時長生時脫胎神化乃是用自身本命推算四時長生者此法一年一周天一日一周天一日乃晝夜用子午時生時曰長生時為防危共七箇時辰五百六十箇時辰為一候溫養沐浴生殺野戰脫胎並在此其中謹祕勿妄泄之西山十二真人曰凡流開口論天機只能狂説不能知世上衆生無鑑識及至逢真説道非大丹直指卷下
